name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - name: installer
            argsWithoutMsi: --bundles nsis
          - name: portable
            args: --no-bundle --features portable
            uploadPlainBinary: true
            assetNamePattern: 'BD2ModManager-[version]-portable[ext]'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Download bundled tools
        run: pnpm download:modpreview

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Get build args
        id: build_args
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          MATRIX_NAME="${{ matrix.name }}"
          if [[ "$MATRIX_NAME" == "installer" && ( "$VERSION" == *"-dev"* || "$VERSION" == *"-beta"* ) ]]; then
            echo "Dev/Beta installer: skipping MSI"
            echo "args=${{ matrix.argsWithoutMsi }}" >> $GITHUB_OUTPUT
          else
            echo "args=${{ matrix.args }}" >> $GITHUB_OUTPUT
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'BD2ModManager v__VERSION__'
          releaseDraft: true
          args: ${{ steps.build_args.outputs.args }} 
          uploadPlainBinary: ${{ matrix.uploadPlainBinary || false }}
          assetNamePattern: ${{ matrix.assetNamePattern || '' }}