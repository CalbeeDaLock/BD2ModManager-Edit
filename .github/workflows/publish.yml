name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - name: installer
          - name: portable
            args: --no-bundle --features portable
            uploadPlainBinary: true
            assetNamePattern: 'BD2ModManager-[version]-portable[ext]'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Download bundled tools
        run: pnpm download:modpreview

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: __VERSION__
          releaseName: 'BD2ModManager v__VERSION__'
          releaseDraft: true
          args: ${{ matrix.args }}
          uploadPlainBinary: ${{ matrix.uploadPlainBinary || false }}
          assetNamePattern: ${{ matrix.assetNamePattern || '' }}